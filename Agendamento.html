<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="box">
    <h2>Login</h2>

    <input type="email" id="emailLogin" placeholder="Email">
    <input type="password" id="senhaLogin" placeholder="Senha">
    <button onclick="login()">Entrar</button>

    <p>Não tem conta
      <a href="#" onclick="mostrarCadastro(); return false;">Criar conta</a>
    </p>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroBox" class="box" style="display: none;">
    <h2>Criar Conta</h2>
    <input type="email" id="emailCadastro" placeholder="Email">
    <input type="password" id="senhaCadastro" placeholder="Senha">
    <button onclick="cadastrar()">Cadastrar</button>

    <p>Já tem conta
      <a href="#" onclick="mostrarLogin(); return false;">Fazer login</a>
    </p>
  </div>

  <!-- AGENDAMENTO -->
  <div id="agendamentoBox" class="box" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Agendar</h2>
    <a href="#" onclick="logout()" style="color: #ff416c; font-size: 12px; font-weight: bold;">SAIR</a>
  </div>

  <form id="formAgendamento">
    <input type="text" id="nomeClienteAgendamento" placeholder="Nome" required>

  <div class="servicos-check">
    <p style="text-align: left; margin-bottom: 10px; color: gold;">Escolha os serviços:</p>
    <label><input type="checkbox" name="servico" value="Corte"> Corte (R$ 40)</label>
    <label><input type="checkbox" name="servico" value="Barba"> Barba (R$ 40)</label>
    <label><input type="checkbox" name="servico" value="Sobrancelha"> Sobrancelha (R$ 10)</label>
    <label><input type="checkbox" name="servico" value="Pezinho"> Pezinho (R$ 10)</label>
  </div>

  <input type="date" id="dataAgendamento" required>
  <input type="time" id="horaAgendamento" required>
  <button type="submit">Finalizar Agendamento</button>
  </form>
  </div>

</div>
<script>
const loginBox = document.getElementById("loginBox");
const cadastroBox = document.getElementById("cadastroBox");
const agendamentoBox = document.getElementById("agendamentoBox");

// alternar telas
function mostrarCadastro(){
  loginBox.style.display = "none";
  cadastroBox.style.display = "block";
}

function mostrarLogin(){
  cadastroBox.style.display ="none";
  loginBox.style.display = "block";
}

// cadastrar usuario
function cadastrar(){
  const email = document.getElementById("emailCadastro").value;
  const senha = document.getElementById("senhaCadastro").value;

  if (!email || !senha) {
    alert ("Preencha tudo");
    return;
  }

  localStorage.setItem("email", email);
  localStorage.setItem("senha", senha);

  alert("Conta criada com sucesso");

  mostrarLogin(); 
}

// login
function login() {
  const email = document.getElementById("emailLogin").value;
  const senha = document.getElementById("senhaLogin").value;

  const emailSalvo = localStorage.getItem("email");
  const senhaSalva = localStorage.getItem("senha");

  if (email == emailSalvo && senha == senhaSalva) {
    localStorage.setItem("logado", "true");

    loginBox.style.display = "none";
    agendamentoBox.style.display = "block"; 
  } else {
    alert ("Email ou senha inválidos");
  }
}

// manter login
window.onload = function() {
  if (localStorage.getItem("logado") == "true") {
    loginBox.style.display = "none";
    agendamentoBox.style.display = "block";
  }
}

document.getElementById("formAgendamento").addEventListener("submit", function(event) {
  event.preventDefault();

  const nome = document.getElementById("nomeClienteAgendamento").value;
  const data = document.getElementById("dataAgendamento").value;
  const hora = document.getElementById("horaAgendamento").value;

  // Pegar todos os serviços marcados
  const checkboxes = document.querySelectorAll('input[name="servico"]:checked');
  let servicosEscolhidos = [];
  checkboxes.forEach((item) => {
    servicosEscolhidos.push(item.value);
  });

  // Validar se pelo menos um serviço foi escolhido
  if (servicosEscolhidos.length === 0) {
    alert("Por favor, selecione ao menos um serviço!");
    return;
  }

  const novoAgendamento = {
    cliente: nome,
    servicos: servicosEscolhidos.join(", "), // Junta os serviços com vírgula
    data: data,
    hora: hora
  };

  // Salvar no LocalStorage
  let agendamentos = JSON.parse(localStorage.getItem("listaAgendamentos")) || [];
  agendamentos.push(novoAgendamento);
  localStorage.setItem("listaAgendamentos", JSON.stringify(agendamentos));

  alert(`Agendamento realizado!\nCliente: ${nome}\nServiços: ${servicosEscolhidos.join(" + ")}\nData: ${data} às ${hora}`);
  
  this.reset();
});
</script>
</body>
</html>
